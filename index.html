<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員課程紀錄 - 數位記課管理</title>
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="學員課程紀錄">
    <meta name="theme-color" content="#2d6a4f">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1039/1039328.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Signature Pad -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root {
            --golf-green: #2d6a4f;
            --golf-grass: #40916c;
            --golf-light: #d8f3dc;
            --golf-ball: #ffffff;
            --golf-accent: #ff9f1c;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; /* Very light green */
        }
        .student-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-bottom: 4px solid #e2e8f0;
        }
        .student-card:active {
            transform: scale(0.98);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .signature-canvas {
            border: 3px dashed #b7e4c7;
            border-radius: 2rem;
            cursor: crosshair;
            background-color: #f7fee7;
            touch-action: none; /* Prevent scrolling while signing */
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }
        .media-preview-container {
            scrollbar-width: none;
        }
        .media-preview-container::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .print-only { display: block !important; }
            .log-card { 
                break-inside: avoid; 
                border: 1px solid #e2e8f0; 
                margin-bottom: 10px; 
                padding: 10px; 
                border-radius: 12px;
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .print-page {
                page-break-after: always;
                padding: 20px;
            }
            .print-page:last-child {
                page-break-after: auto;
            }
            /* Optimized for 10 per page */
            .log-card .media-grid { display: none !important; } /* Hide media in compact print */
            .log-card .note-box { flex: 1; margin-bottom: 0 !important; padding: 5px 10px !important; font-size: 11px !important; }
            .log-card .signature-box { width: 100px !important; padding: 2px !important; border: 1px solid #eee !important; }
            .log-card .signature-box img { max-height: 40px !important; }
            .log-card .header-info { width: 150px; flex-shrink: 0; }
            .log-card .header-info p { font-size: 12px !important; }
            .log-card .lesson-badge { font-size: 10px !important; padding: 2px 6px !important; }
        }
        .print-only { display: none; }
        
        /* Golf Specific Decorations */
        .golf-ball-pattern {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .grass-edge {
            height: 8px;
            background: linear-gradient(90deg, #40916c 25%, #52b788 25%, #52b788 50%, #40916c 50%, #40916c 75%, #52b788 75%);
            background-size: 40px 100%;
        }
        .cute-border {
            border-radius: 40px 40px 30px 30px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Mock Data & Storage ---
        const STORAGE_KEY = 'justsign_attendance_data_v3';

        const saveToStorage = (data) => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                alert('儲存空間已滿，請刪除部分含有大型影片的紀錄。');
            }
        };

        const loadFromStorage = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : { students: [], logs: [] };
        };

        // --- Components ---

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const CheckInModal = ({ isOpen, onClose, onConfirm, studentName }) => {
            const canvasRef = useRef(null);
            const fullCanvasRef = useRef(null);
            const signaturePadRef = useRef(null);
            const [mediaFiles, setMediaFiles] = useState([]);
            const [lessonNote, setLessonNote] = useState('');
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [tempSignature, setTempSignature] = useState(null);
            const fileInputRef = useRef(null);

            const initSignaturePad = (canvas, existingDataUrl = null) => {
                if (!canvas) return;
                
                const rect = canvas.getBoundingClientRect();
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                
                canvas.width = rect.width * ratio;
                canvas.height = rect.height * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                
                if (signaturePadRef.current) {
                    signaturePadRef.current.off(); 
                }

                const pad = new SignaturePad(canvas, {
                    backgroundColor: 'rgba(255, 255, 255, 0)',
                    minWidth: 1.8,
                    maxWidth: 5.0,
                    velocityFilterWeight: 0.7,
                    throttle: 0 
                });
                
                signaturePadRef.current = pad;

                if (existingDataUrl) {
                    pad.fromDataURL(existingDataUrl, { ratio: ratio, width: rect.width, height: rect.height });
                }
            };

            useEffect(() => {
                if (isOpen && !isFullScreen && canvasRef.current) {
                    const timer = setTimeout(() => {
                        initSignaturePad(canvasRef.current, tempSignature);
                    }, 350);
                    return () => clearTimeout(timer);
                }
                if (isOpen && !isFullScreen && !tempSignature) {
                    setMediaFiles([]); 
                    setLessonNote('');
                }
            }, [isOpen, isFullScreen]);

            useEffect(() => {
                if (isFullScreen && fullCanvasRef.current) {
                    const timer = setTimeout(() => {
                        initSignaturePad(fullCanvasRef.current, tempSignature);
                    }, 50);
                    return () => clearTimeout(timer);
                }
            }, [isFullScreen]);

            const handleToggleFullScreen = (toFull) => {
                if (signaturePadRef.current && !signaturePadRef.current.isEmpty()) {
                    setTempSignature(signaturePadRef.current.toDataURL());
                }
                setIsFullScreen(toFull);
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setMediaFiles(prev => [...prev, {
                            type: file.type.startsWith('video') ? 'video' : 'image',
                            url: event.target.result,
                            name: file.name
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleConfirm = () => {
                if (signaturePadRef.current && !signaturePadRef.current.isEmpty()) {
                    onConfirm(signaturePadRef.current.toDataURL(), mediaFiles, lessonNote);
                    setTempSignature(null);
                    onClose();
                } else {
                    alert('請先完成手寫簽名');
                }
            };

            const clear = () => {
                if (signaturePadRef.current) signaturePadRef.current.clear();
                setTempSignature(null);
            };

            const handleClose = () => {
                setTempSignature(null);
                onClose();
            };

            const removeMedia = (index) => {
                setMediaFiles(mediaFiles.filter((_, i) => i !== index));
            };

            if (!isOpen) return null;

            if (isFullScreen) {
                return (
                    <div className="fixed inset-0 bg-white z-[200] flex flex-col no-print">
                        <div className="bg-emerald-600 p-6 flex justify-between items-center text-white">
                            <div>
                                <h2 className="text-xl font-bold">全螢幕手寫簽名</h2>
                                <p className="text-emerald-100 text-xs">學員：{studentName}</p>
                            </div>
                            <div className="flex space-x-2">
                                <button onClick={clear} className="bg-emerald-500 px-4 py-2 rounded-xl text-sm font-bold border border-emerald-400">
                                    清除
                                </button>
                                <button onClick={() => handleToggleFullScreen(false)} className="bg-white text-emerald-600 px-6 py-2 rounded-xl text-sm font-bold shadow-md">
                                    完成
                                </button>
                            </div>
                        </div>
                        <div className="flex-grow bg-emerald-50 relative p-4">
                            <canvas 
                                ref={fullCanvasRef} 
                                className="signature-canvas w-full h-full bg-white shadow-inner"
                            ></canvas>
                            <div className="absolute inset-0 pointer-events-none flex items-center justify-center opacity-10">
                                <Icon name="signature" className="w-40 h-40 text-emerald-900" />
                            </div>
                        </div>
                        <div className="p-4 bg-white text-center text-gray-400 text-xs italic">
                            請在白色區域內手寫簽名，完成後點擊右上角「完成」
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-[100] p-0 sm:p-4 no-print">
                    <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up max-h-[95vh] overflow-y-auto no-scrollbar">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                    <Icon name="flag" className="w-6 h-6 text-emerald-600 mr-2" />
                                    簽到確認
                                </h2>
                                <p className="text-gray-500 text-sm">請學員 <span className="text-emerald-600 font-bold">{studentName}</span> 在下方簽名</p>
                            </div>
                            <button onClick={handleClose} className="bg-gray-100 p-2 rounded-full hover:bg-red-50 transition">
                                <Icon name="x" className="w-5 h-5 text-gray-500" />
                            </button>
                        </div>
                        
                        {/* Signature Area */}
                        <div className="relative mb-6 group">
                            <canvas 
                                ref={canvasRef} 
                                className="signature-canvas w-full h-40 shadow-inner"
                            ></canvas>
                            <div className="absolute top-3 right-3 flex space-x-2">
                                <button 
                                    onClick={() => handleToggleFullScreen(true)}
                                    className="text-xs text-emerald-600 hover:bg-emerald-50 flex items-center bg-white px-3 py-1.5 rounded-full shadow-sm border border-emerald-100 transition"
                                >
                                    <Icon name="maximize" className="w-3.5 h-3.5 mr-1" /> 全螢幕
                                </button>
                            </div>
                            <button 
                                onClick={clear}
                                className="absolute bottom-3 right-3 text-sm text-gray-400 hover:text-red-500 flex items-center bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100 transition"
                            >
                                <Icon name="rotate-ccw" className="w-4 h-4 mr-1" /> 重簽
                            </button>
                        </div>

                        {/* Text Note Area */}
                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-500 mb-2 flex items-center">
                                <Icon name="pen-tool" className="w-4 h-4 mr-1 text-emerald-500" />
                                課堂筆記 (文字紀錄)
                            </label>
                            <textarea 
                                value={lessonNote}
                                onChange={(e) => setLessonNote(e.target.value)}
                                placeholder="例：今日練習了推桿動作，手感不錯..."
                                className="w-full bg-gray-50 border-none rounded-2xl px-5 py-3 focus:ring-2 focus:ring-emerald-500 transition outline-none h-24 text-sm"
                            ></textarea>
                        </div>

                        {/* Media Upload Area */}
                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-500 mb-3 flex justify-between items-center">
                                <span className="flex items-center">
                                    <Icon name="image" className="w-4 h-4 mr-1 text-emerald-500" />
                                    媒體紀錄 (圖片或影片)
                                </span>
                            </label>
                            
                            <div className="flex space-x-3 overflow-x-auto media-preview-container pb-2">
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="flex-shrink-0 w-20 h-20 bg-emerald-50 border-2 border-dashed border-emerald-200 rounded-2xl flex flex-col items-center justify-center text-emerald-400 hover:border-emerald-400 hover:text-emerald-500 transition"
                                >
                                    <Icon name="camera" className="w-5 h-5 mb-1" />
                                    <span className="text-[10px] font-bold">上傳</span>
                                </button>
                                
                                {mediaFiles.map((file, idx) => (
                                    <div key={idx} className="flex-shrink-0 w-20 h-20 relative rounded-2xl overflow-hidden group border border-emerald-100">
                                        {file.type === 'video' ? (
                                            <video src={file.url} className="w-full h-full object-cover" />
                                        ) : (
                                            <img src={file.url} className="w-full h-full object-cover" />
                                        )}
                                        <button 
                                            onClick={() => removeMedia(idx)}
                                            className="absolute top-1 right-1 bg-black bg-opacity-50 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition"
                                        >
                                            <Icon name="x" className="w-3 h-3" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <input 
                                type="file" 
                                ref={fileInputRef}
                                onChange={handleFileChange}
                                accept="image/*,video/*"
                                multiple
                                className="hidden"
                            />
                        </div>

                        <button 
                            onClick={handleConfirm}
                            className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition transform active:scale-95"
                        >
                            揮桿簽到！儲存紀錄
                        </button>
                    </div>
                </div>
            );
        };

        const EditLogModal = ({ isOpen, onClose, onSave, log }) => {
            const [mediaFiles, setMediaFiles] = useState([]);
            const [lessonNote, setLessonNote] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (isOpen && log) {
                    setMediaFiles(log.media || []);
                    setLessonNote(log.note || '');
                }
            }, [isOpen, log]);

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setMediaFiles(prev => [...prev, {
                            type: file.type.startsWith('video') ? 'video' : 'image',
                            url: event.target.result,
                            name: file.name
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleSave = () => {
                onSave({ ...log, media: mediaFiles, note: lessonNote });
                onClose();
            };

            const removeMedia = (index) => {
                setMediaFiles(mediaFiles.filter((_, i) => i !== index));
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-[100] p-0 sm:p-4 no-print">
                    <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up max-h-[95vh] overflow-y-auto no-scrollbar">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                    <Icon name="edit" className="w-6 h-6 text-emerald-600 mr-2" />
                                    編輯課程紀錄
                                </h2>
                                <p className="text-gray-500 text-sm">正在編輯 <span className="text-emerald-600 font-bold">{log.studentName}</span> 的紀錄</p>
                            </div>
                            <button onClick={onClose} className="bg-gray-100 p-2 rounded-full hover:bg-red-50 transition">
                                <Icon name="x" className="w-5 h-5 text-gray-500" />
                            </button>
                        </div>

                        {/* Text Note Area */}
                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-500 mb-2 flex items-center">
                                <Icon name="pen-tool" className="w-4 h-4 mr-1 text-emerald-500" />
                                課堂筆記 (文字紀錄)
                            </label>
                            <textarea 
                                value={lessonNote}
                                onChange={(e) => setLessonNote(e.target.value)}
                                placeholder="例：今日練習了推桿動作，手感不錯..."
                                className="w-full bg-gray-50 border-none rounded-2xl px-5 py-3 focus:ring-2 focus:ring-emerald-500 transition outline-none h-24 text-sm"
                            ></textarea>
                        </div>

                        {/* Media Upload Area */}
                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-500 mb-3 flex justify-between items-center">
                                <span className="flex items-center">
                                    <Icon name="image" className="w-4 h-4 mr-1 text-emerald-500" />
                                    媒體紀錄 (圖片或影片)
                                </span>
                            </label>
                            
                            <div className="flex space-x-3 overflow-x-auto media-preview-container pb-2">
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="flex-shrink-0 w-20 h-20 bg-emerald-50 border-2 border-dashed border-emerald-200 rounded-2xl flex flex-col items-center justify-center text-emerald-400 hover:border-emerald-400 hover:text-emerald-500 transition"
                                >
                                    <Icon name="camera" className="w-5 h-5 mb-1" />
                                    <span className="text-[10px] font-bold">上傳</span>
                                </button>
                                
                                {mediaFiles.map((file, idx) => (
                                    <div key={idx} className="flex-shrink-0 w-20 h-20 relative rounded-2xl overflow-hidden group border border-emerald-100">
                                        {file.type === 'video' ? (
                                            <video src={file.url} className="w-full h-full object-cover" />
                                        ) : (
                                            <img src={file.url} className="w-full h-full object-cover" />
                                        )}
                                        <button 
                                            onClick={() => removeMedia(idx)}
                                            className="absolute top-1 right-1 bg-black bg-opacity-50 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition"
                                        >
                                            <Icon name="x" className="w-3 h-3" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <input 
                                type="file" 
                                ref={fileInputRef}
                                onChange={handleFileChange}
                                accept="image/*,video/*"
                                multiple
                                className="hidden"
                            />
                        </div>

                        <button 
                            onClick={handleSave}
                            className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition transform active:scale-95"
                        >
                            儲存變更
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState({ students: [], logs: [] });
            const [view, setView] = useState('home'); // home, students, logs
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [checkInStudent, setCheckInStudent] = useState(null);
            const [editingLog, setEditingLog] = useState(null);
            const [newStudent, setNewStudent] = useState({ name: '', totalLessons: 0, note: '' });
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStudentId, setFilterStudentId] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isLocalFile, setIsLocalFile] = useState(false);
            const [isDataModalOpen, setIsDataModalOpen] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                const loadedData = loadFromStorage();
                setData(loadedData);
                
                // Online/Offline status
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                // Check if running as local file
                if (window.location.protocol === 'file:') {
                    setIsLocalFile(true);
                }

                // Listen for PWA install prompt
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                });

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const exportData = () => {
                try {
                    const dataStr = JSON.stringify(data);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const date = new Date().toISOString().split('T')[0];
                    a.download = `學員課程紀錄_備份_${date}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    alert('資料匯出成功！您可以將此檔案傳送到另一台裝置進行匯入。');
                } catch (err) {
                    alert('匯出失敗：' + err.message);
                }
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.students && importedData.logs) {
                            if (confirm('匯入將會覆蓋目前裝置上的所有資料，確定要繼續嗎？')) {
                                setData(importedData);
                                alert('資料匯入成功！');
                                setIsDataModalOpen(false);
                            }
                        } else {
                            alert('檔案格式不正確，請確保上傳的是正確的備份檔案。');
                        }
                    } catch (err) {
                        alert('讀取檔案失敗：' + err.message);
                    }
                };
                reader.readAsText(file);
            };

            const handleInstallClick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            setDeferredPrompt(null);
                        }
                    });
                } else if (isLocalFile) {
                    alert('目前是直接開啟檔案，無法安裝為 APP。請將專案上傳至網站空間（需 HTTPS）後，即可使用安裝功能。');
                } else {
                    alert('請使用瀏覽器選單中的「加入主畫面」功能進行安裝。');
                }
            };

            useEffect(() => {
                saveToStorage(data);
                if (window.lucide) window.lucide.createIcons();
            }, [data]);

            const addStudent = () => {
                if (!newStudent.name) return;
                const student = {
                    id: Date.now().toString(),
                    name: newStudent.name,
                    remainingLessons: Number(newStudent.totalLessons),
                    totalLessons: Number(newStudent.totalLessons),
                    note: newStudent.note,
                    createdAt: new Date().toISOString()
                };
                setData(prev => ({
                    ...prev,
                    students: [student, ...prev.students]
                }));
                setNewStudent({ name: '', totalLessons: 0, note: '' });
                setIsAddModalOpen(false);
            };

            const completeCheckIn = (signatureUrl, mediaFiles, lessonNote) => {
                if (!checkInStudent) return;
                
                setData(prev => {
                    const studentIndex = prev.students.findIndex(s => s.id === checkInStudent.id);
                    if (studentIndex === -1) return prev;

                    const updatedStudents = [...prev.students];
                    const student = updatedStudents[studentIndex];
                    updatedStudents[studentIndex] = {
                        ...student,
                        remainingLessons: student.remainingLessons - 1
                    };

                    const newLog = {
                        id: Date.now().toString(),
                        studentId: student.id,
                        studentName: student.name,
                        timestamp: new Date().toISOString(),
                        signature: signatureUrl,
                        media: mediaFiles,
                        note: lessonNote,
                        type: 'check-in'
                    };

                    return {
                        students: updatedStudents,
                        logs: [newLog, ...prev.logs]
                    };
                });
                setCheckInStudent(null);
            };

            const saveEditedLog = (updatedLog) => {
                setData(prev => ({
                    ...prev,
                    logs: prev.logs.map(l => l.id === updatedLog.id ? updatedLog : l)
                }));
            };

            const deleteStudent = (id) => {
                if (confirm('確定要刪除這位學員嗎？所有紀錄將會保留。')) {
                    setData(prev => ({
                        ...prev,
                        students: prev.students.filter(s => s.id !== id)
                    }));
                }
            };

            const deleteLog = (id) => {
                const logToDelete = data.logs.find(l => l.id === id);
                if (!logToDelete) return;

                if (confirm(`確定要刪除這筆紀錄嗎？\n\n系統將自動退還學員「${logToDelete.studentName}」 1 堂課。`)) {
                    const updatedStudents = data.students.map(s => {
                        if (s.id === logToDelete.studentId) {
                            return {
                                ...s,
                                remainingLessons: Number(s.remainingLessons) + 1
                            };
                        }
                        return s;
                    });

                    const updatedLogs = data.logs.filter(l => l.id !== id);

                    setData({
                        students: updatedStudents,
                        logs: updatedLogs
                    });
                }
            };

            const navigateToStudentLogs = (studentId) => {
                setFilterStudentId(studentId);
                setView('logs');
                setSearchTerm('');
            };

            const exportPDF = () => {
                // Ensure lucide icons are rendered before printing
                if (window.lucide) window.lucide.createIcons();
                
                // Add a small delay to ensure rendering is complete
                setTimeout(() => {
                    window.print();
                }, 500);
            };

            const downloadHTML = () => {
                try {
                    const htmlContent = document.documentElement.outerHTML;
                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '學員課程紀錄_備份.html';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    alert('下載失敗，請嘗試使用電腦瀏覽器。');
                }
            };

            const filteredStudents = data.students.filter(s => 
                s.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                (s.note && s.note.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const filteredLogs = filterStudentId 
                ? data.logs.filter(l => l.studentId === filterStudentId)
                : data.logs;

            const currentFilteredStudentName = filterStudentId 
                ? data.students.find(s => s.id === filterStudentId)?.name 
                : null;

            const renderHome = () => (
                <div className="space-y-6 pb-24 no-print">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg shadow-emerald-200 relative overflow-hidden">
                            <Icon name="users" className="absolute -right-2 -bottom-2 w-20 h-20 text-emerald-500 opacity-20" />
                            <p className="text-emerald-100 text-sm mb-1">總學員數</p>
                            <h3 className="text-3xl font-bold">{data.students.length}</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 relative overflow-hidden">
                            <Icon name="target" className="absolute -right-2 -bottom-2 w-20 h-20 text-emerald-50 opacity-50" />
                            <p className="text-gray-500 text-sm mb-1">今日簽到</p>
                            <h3 className="text-3xl font-bold text-gray-800">
                                {data.logs.filter(l => new Date(l.timestamp).toDateString() === new Date().toDateString()).length}
                            </h3>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <div className="relative group">
                            <input 
                                type="text" 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                placeholder="搜尋學員姓名或備註..."
                                className="w-full bg-white border border-emerald-100 rounded-2xl pl-12 pr-5 py-4 shadow-sm focus:ring-2 focus:ring-emerald-500 transition outline-none"
                            />
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-400 group-focus-within:text-emerald-600 transition-colors">
                                <Icon name="search" className="w-5 h-5" />
                            </div>
                        </div>

                        <div className="flex justify-between items-center px-2">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center">
                                <Icon name="flag" className="w-5 h-5 mr-2 text-emerald-600" />
                                快速簽到
                            </h2>
                            <button 
                                onClick={() => setIsAddModalOpen(true)}
                                className="text-emerald-600 font-bold flex items-center bg-emerald-50 px-4 py-2 rounded-full hover:bg-emerald-100 transition"
                            >
                                <Icon name="plus-circle" className="w-5 h-5 mr-1" /> 新增學員
                            </button>
                        </div>

                        <div className="space-y-4">
                            {filteredStudents.length === 0 ? (
                                <div className="bg-white rounded-3xl p-12 text-center border border-dashed border-emerald-200">
                                    <div className="bg-emerald-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Icon name={searchTerm ? "search-x" : "users"} className="w-8 h-8 text-emerald-400" />
                                    </div>
                                    <p className="text-gray-500">{searchTerm ? `找不到與 "${searchTerm}" 相關的學員` : '尚無學員，趕快新增一個吧！'}</p>
                                </div>
                            ) : (
                                filteredStudents.map(student => (
                                    <div key={student.id} className="student-card bg-white p-5 rounded-3xl shadow-sm border border-emerald-50 flex justify-between items-center group hover:border-emerald-200 transition-all">
                                        <div className="flex-grow cursor-pointer" onClick={() => navigateToStudentLogs(student.id)}>
                                            <h4 className="font-bold text-lg text-gray-800 group-hover:text-emerald-600 transition-colors">{student.name}</h4>
                                            <div className="flex items-center space-x-3 mt-1">
                                                <span className={`text-xs px-3 py-1 rounded-full font-bold ${student.remainingLessons <= 3 ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                    剩餘 {student.remainingLessons} 堂
                                                </span>
                                                {student.note && <span className="text-xs text-gray-400 truncate max-w-[150px]">{student.note}</span>}
                                            </div>
                                        </div>
                                        <button 
                                            disabled={student.remainingLessons <= 0}
                                            onClick={(e) => { e.stopPropagation(); setCheckInStudent(student); }}
                                            className={`px-6 py-3 rounded-2xl font-bold transition transform active:scale-95 ${
                                                student.remainingLessons <= 0 
                                                ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                                                : 'bg-emerald-600 text-white hover:bg-emerald-700 shadow-md shadow-emerald-100'
                                            }`}
                                        >
                                            簽到
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                    <div className="grass-edge rounded-full opacity-50"></div>
                </div>
            );

            const renderLogs = () => {
                // Grouping logic for PDF export
                const getGroupedLogs = () => {
                    const grouped = {};
                    filteredLogs.forEach(log => {
                        if (!grouped[log.studentId]) {
                            grouped[log.studentId] = {
                                studentName: log.studentName,
                                logs: []
                            };
                        }
                        grouped[log.studentId].logs.push(log);
                    });
                    return Object.values(grouped);
                };

                const chunkArray = (arr, size) => {
                    const chunks = [];
                    for (let i = 0; i < arr.length; i += size) {
                        chunks.push(arr.slice(i, i + size));
                    }
                    return chunks;
                };

                const groupedLogs = getGroupedLogs();

                return (
                    <div className="space-y-4 pb-24">
                        <div className="flex justify-between items-center px-2 no-print">
                            <h2 className="text-2xl font-bold text-gray-800">
                                {filterStudentId ? `${currentFilteredStudentName} 的紀錄` : '課程簽到紀錄'}
                            </h2>
                            <div className="flex items-center space-x-2">
                                {filterStudentId && (
                                    <button 
                                        onClick={() => setFilterStudentId(null)}
                                        className="text-emerald-600 text-sm font-bold flex items-center bg-emerald-50 px-3 py-1 rounded-full hover:bg-emerald-100 transition"
                                    >
                                        <Icon name="list" className="w-4 h-4 mr-1" /> 顯示全部
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="flex justify-end space-x-2 px-2 no-print">
                            <button 
                                onClick={exportPDF}
                                className="w-full text-white text-sm font-bold flex items-center justify-center bg-emerald-600 py-4 rounded-2xl shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition transform active:scale-95"
                            >
                                <Icon name="file-text" className="w-5 h-5 mr-2" /> 匯出課程報告 / 列印 (依學員分頁)
                            </button>
                        </div>

                        {/* Print Header */}
                        <div className="print-only mb-4 text-center">
                            <h1 className="text-2xl font-bold text-emerald-800">學員課程紀錄總覽報告</h1>
                            <p className="text-gray-400 text-xs">生成時間：{new Date().toLocaleString()}</p>
                        </div>
                        
                        <div className="space-y-4">
                            {filteredLogs.length === 0 ? (
                                <div className="bg-white rounded-3xl p-12 text-center text-gray-500 border border-emerald-100 no-print">
                                    <Icon name="clipboard-list" className="w-12 h-12 text-emerald-100 mx-auto mb-4" />
                                    <p>尚無相關簽到紀錄</p>
                                </div>
                            ) : (
                                // Web View (Standard list)
                                <div className="no-print space-y-4">
                                    {filteredLogs.map(log => (
                                        <div key={log.id} className="bg-white p-6 rounded-3xl shadow-sm border border-emerald-50 log-card hover:border-emerald-200 transition-all">
                                            <div className="flex justify-between items-start mb-4 w-full">
                                                <div className="flex items-center space-x-4 header-info">
                                                    <div className="bg-emerald-100 p-2 rounded-xl no-print">
                                                        <Icon name="check" className="w-6 h-6 text-emerald-600" />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-lg text-gray-800">{log.studentName}</p>
                                                        <p className="text-xs text-gray-400 flex items-center">
                                                            <Icon name="clock" className="w-3 h-3 mr-1" />
                                                            {new Date(log.timestamp).toLocaleString('zh-TW')}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center space-x-2">
                                                    <span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-sm font-bold border border-emerald-100 lesson-badge">-1 堂</span>
                                                    <div className="flex flex-col space-y-2 no-print">
                                                        <button onClick={() => setEditingLog(log)} className="text-gray-300 hover:text-emerald-500 transition">
                                                            <Icon name="edit-3" className="w-4 h-4" />
                                                        </button>
                                                        <button onClick={() => deleteLog(log.id)} className="text-gray-300 hover:text-red-500 transition">
                                                            <Icon name="trash-2" className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {log.note && (
                                                <div className="mb-4 p-4 bg-emerald-50 rounded-2xl border border-emerald-100 text-sm text-emerald-800 leading-relaxed relative overflow-hidden note-box">
                                                    <div className="flex items-center mb-1 text-emerald-400 no-print">
                                                        <Icon name="sticky-note" className="w-4 h-4 mr-1" />
                                                        <span className="text-[10px] font-bold uppercase tracking-wider">課堂筆記</span>
                                                    </div>
                                                    {log.note}
                                                </div>
                                            )}

                                            {log.media && log.media.length > 0 && (
                                                <div className="mb-4 grid grid-cols-2 gap-2 media-grid">
                                                    {log.media.map((file, i) => (
                                                        <div key={i} className="aspect-square rounded-2xl overflow-hidden bg-gray-100 border border-emerald-50 relative group">
                                                            {file.type === 'video' ? (
                                                                <div className="w-full h-full flex items-center justify-center bg-gray-200 text-gray-400 text-xs no-print">
                                                                    <video src={file.url} controls className="w-full h-full object-cover" />
                                                                </div>
                                                            ) : (
                                                                <img src={file.url} className="w-full h-full object-cover" />
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="bg-emerald-50 bg-opacity-30 rounded-2xl p-4 flex flex-col items-center border border-emerald-50 border-dashed signature-box">
                                                <p className="text-[10px] text-emerald-400 uppercase font-bold tracking-widest mb-2 self-start flex items-center no-print">
                                                    <Icon name="signature" className="w-3 h-3 mr-1" />
                                                    學員簽名回條
                                                </p>
                                                {log.signature ? (
                                                    <img src={log.signature} alt="Signature" className="max-h-24 object-contain" />
                                                ) : (
                                                    <p className="text-gray-300 italic py-4">無簽名資料</p>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Print View (Grouped by Student + Chunked by 10) */}
                            <div className="print-only">
                                {groupedLogs.map((group, groupIdx) => {
                                    const logChunks = chunkArray(group.logs, 10);
                                    return (
                                        <React.Fragment key={groupIdx}>
                                            {logChunks.map((chunk, pageIdx) => (
                                                <div key={pageIdx} className="print-page">
                                                    <div className="mb-6 text-center border-b-2 border-emerald-600 pb-2">
                                                        <h2 className="text-xl font-bold text-emerald-800">
                                                            學員：{group.studentName} - 課程紀錄報告
                                                        </h2>
                                                        <p className="text-xs text-gray-500">
                                                            第 {pageIdx + 1} 頁 {logChunks.length > 1 ? `(共 ${logChunks.length} 頁)` : ''}
                                                        </p>
                                                    </div>
                                                    
                                                    {chunk.map(log => (
                                                        <div key={log.id} className="log-card">
                                                            <div className="header-info">
                                                                <p className="font-bold text-sm text-gray-800">{log.studentName}</p>
                                                                <p className="text-[10px] text-gray-400">
                                                                    {new Date(log.timestamp).toLocaleString('zh-TW', { dateStyle: 'medium', timeStyle: 'short' })}
                                                                </p>
                                                                <span className="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full text-[10px] font-bold border border-emerald-100 lesson-badge inline-block mt-1">-1 堂</span>
                                                            </div>
                                                            
                                                            <div className="note-box bg-emerald-50 rounded-lg p-2 text-[11px] text-emerald-800">
                                                                {log.note || <span className="text-gray-300 italic">無備註紀錄</span>}
                                                            </div>

                                                            <div className="signature-box flex-shrink-0 bg-white rounded-lg flex items-center justify-center">
                                                                {log.signature ? (
                                                                    <img src={log.signature} alt="Signature" className="max-h-10 object-contain" />
                                                                ) : (
                                                                    <span className="text-[8px] text-gray-200 italic">無簽名</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ))}
                                        </React.Fragment>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderStudents = () => (
                <div className="space-y-4 pb-24 no-print">
                    <div className="flex justify-between items-center px-2">
                        <h2 className="text-2xl font-bold text-gray-800">學員列表</h2>
                        <button 
                            onClick={() => setIsAddModalOpen(true)}
                            className="bg-emerald-600 text-white p-3 rounded-full shadow-lg hover:bg-emerald-700 transition transform active:scale-95"
                        >
                            <Icon name="plus" className="w-6 h-6" />
                        </button>
                    </div>

                    <div className="relative mb-4 group">
                        <input 
                            type="text" 
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            placeholder="搜尋學員姓名或備註..."
                            className="w-full bg-white border border-emerald-100 rounded-2xl pl-12 pr-5 py-4 shadow-sm focus:ring-2 focus:ring-emerald-500 transition outline-none"
                        />
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-400 group-focus-within:text-emerald-600 transition-colors">
                            <Icon name="search" className="w-5 h-5" />
                        </div>
                    </div>

                    <div className="grid gap-4">
                        {filteredStudents.length === 0 ? (
                            <div className="bg-white rounded-3xl p-12 text-center border border-dashed border-emerald-200">
                                <Icon name={searchTerm ? "search-x" : "users"} className="w-12 h-12 text-emerald-200 mx-auto mb-4" />
                                <p className="text-gray-500">{searchTerm ? `找不到與 "${searchTerm}" 相關的學員` : '尚無學員'}</p>
                            </div>
                        ) : (
                            filteredStudents.map(student => (
                                <div key={student.id} className="bg-white p-6 rounded-3xl shadow-sm border border-emerald-50 relative group student-card hover:border-emerald-200 transition-all" onClick={() => navigateToStudentLogs(student.id)}>
                                    <div className="flex justify-between cursor-pointer">
                                        <div>
                                            <h3 className="text-xl font-bold text-gray-800 group-hover:text-emerald-600 transition-colors">{student.name}</h3>
                                            <p className="text-sm text-gray-400 mt-1 flex items-center">
                                                <Icon name="calendar" className="w-3 h-3 mr-1" />
                                                建立日期: {new Date(student.createdAt).toLocaleDateString()}
                                            </p>
                                        </div>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); deleteStudent(student.id); }}
                                            className="text-gray-200 hover:text-red-500 transition"
                                        >
                                            <Icon name="trash-2" className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="mt-6 flex items-end justify-between cursor-pointer">
                                        <div className="space-y-1">
                                            <p className="text-xs text-emerald-500 uppercase font-bold tracking-wider">課程進度</p>
                                            <div className="flex items-baseline space-x-1">
                                                <span className="text-3xl font-bold text-emerald-600">{student.remainingLessons}</span>
                                                <span className="text-gray-400 text-sm font-medium">/ {student.totalLessons} 堂</span>
                                            </div>
                                        </div>
                                        <div className="w-32 bg-emerald-50 h-3 rounded-full overflow-hidden border border-emerald-100">
                                            <div 
                                                className="bg-emerald-600 h-full transition-all duration-700 ease-out rounded-full shadow-inner" 
                                                style={{ width: `${(student.remainingLessons / student.totalLessons) * 100}%` }}
                                            ></div>
                                        </div>
                                    </div>
                                    {student.note && (
                                        <div className="mt-4 p-4 bg-emerald-50 bg-opacity-50 rounded-2xl text-sm text-emerald-700 cursor-pointer border border-emerald-50 border-dashed">
                                            <span className="font-bold mr-2">備註:</span> {student.note}
                                        </div>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen max-w-md mx-auto bg-white shadow-2xl relative golf-ball-pattern">
                    {/* Offline Warning */}
                    {!isOnline && (
                        <div className="bg-amber-500 text-white text-[10px] font-bold py-1 px-4 text-center sticky top-0 z-[60] flex items-center justify-center">
                            <Icon name="wifi-off" className="w-3 h-3 mr-2" />
                            目前處於離線模式，資料將儲存於本地裝置
                        </div>
                    )}

                    {/* Header */}
                    <header className={`px-6 pt-8 pb-4 flex justify-between items-center bg-white bg-opacity-90 backdrop-blur-md sticky z-40 no-print border-b border-emerald-50 ${isOnline ? 'top-0' : 'top-[24px]'}`}>
                        <div className="cursor-pointer group" onClick={() => { setView('home'); setFilterStudentId(null); setSearchTerm(''); }}>
                            <div className="flex items-center">
                                <Icon name="flag" className="w-8 h-8 text-emerald-600 mr-2 transform -rotate-12 group-hover:rotate-0 transition-transform" />
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-900 tracking-tight">學員課程紀錄</h1>
                                    <p className="text-emerald-500 text-[10px] font-bold uppercase tracking-[0.2em]">Professional Golf Management</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2">
                            <button 
                                onClick={handleInstallClick}
                                className={`w-10 h-10 rounded-2xl flex items-center justify-center shadow-sm border border-emerald-100 transition-colors ${deferredPrompt ? 'bg-emerald-600 text-white animate-bounce' : 'bg-emerald-50 text-emerald-600'}`}
                                title="安裝 APP"
                            >
                                <Icon name="download-cloud" className="w-5 h-5" />
                            </button>
                            <div className="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center shadow-sm border border-emerald-100 text-emerald-600">
                                <Icon name="bell" className="w-5 h-5" />
                            </div>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="px-6 mt-6">
                        {view === 'home' && renderHome()}
                        {view === 'logs' && renderLogs()}
                        {view === 'students' && renderStudents()}
                    </main>

                    {/* Tab Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass-nav border-t border-emerald-50 px-8 py-4 flex justify-between items-center z-50 rounded-t-[40px] no-print shadow-lg">
                        <button onClick={() => { setView('home'); setFilterStudentId(null); setSearchTerm(''); }} className={`flex flex-col items-center transition-all ${view === 'home' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="layout-grid" className="w-6 h-6" />
                            <span className="text-[10px] mt-1 font-bold">概覽</span>
                        </button>
                        <button onClick={() => { setView('students'); setFilterStudentId(null); setSearchTerm(''); }} className={`flex flex-col items-center transition-all ${view === 'students' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="users" className="w-6 h-6" />
                            <span className="text-[10px] mt-1 font-bold">學員</span>
                        </button>
                        <button onClick={() => { setView('logs'); setFilterStudentId(null); setSearchTerm(''); }} className={`flex flex-col items-center transition-all ${view === 'logs' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <Icon name="clipboard-list" className="w-6 h-6" />
                            <span className="text-[10px] mt-1 font-bold">紀錄</span>
                        </button>
                        <button onClick={() => setIsDataModalOpen(true)} className="flex flex-col items-center text-gray-300 hover:text-emerald-400 transition-colors">
                            <Icon name="database" className="w-6 h-6" />
                            <span className="text-[10px] mt-1 font-bold">資料管理</span>
                        </button>
                    </nav>

                    {/* Data Management Modal */}
                    {isDataModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-[100] p-0 sm:p-4 no-print">
                            <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                        <Icon name="database" className="w-6 h-6 mr-2 text-emerald-600" />
                                        資料備份與轉移
                                    </h2>
                                    <button onClick={() => setIsDataModalOpen(false)} className="bg-gray-100 p-2 rounded-full hover:bg-red-50 transition">
                                        <Icon name="x" className="w-5 h-5 text-gray-500" />
                                    </button>
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                                        <p className="text-sm text-emerald-800 leading-relaxed">
                                            由於資料儲存在您的裝置本地，您可以透過匯出檔案來備份資料，或將檔案傳送到另一台裝置進行匯入，以達成同步。
                                        </p>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4">
                                        <button 
                                            onClick={exportData}
                                            className="flex items-center justify-between bg-white border-2 border-emerald-600 text-emerald-600 px-6 py-4 rounded-2xl font-bold hover:bg-emerald-50 transition"
                                        >
                                            <div className="flex items-center">
                                                <Icon name="upload" className="w-5 h-5 mr-3" />
                                                匯出備份檔案 (.json)
                                            </div>
                                            <Icon name="chevron-right" className="w-5 h-5" />
                                        </button>

                                        <label className="flex items-center justify-between bg-emerald-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-emerald-700 transition cursor-pointer">
                                            <div className="flex items-center">
                                                <Icon name="download" className="w-5 h-5 mr-3" />
                                                匯入備份檔案 (.json)
                                            </div>
                                            <Icon name="chevron-right" className="w-5 h-5" />
                                            <input 
                                                type="file" 
                                                onChange={importData}
                                                accept=".json"
                                                className="hidden"
                                            />
                                        </label>

                                        <button 
                                            onClick={downloadHTML}
                                            className="flex items-center justify-between bg-gray-50 text-gray-500 px-6 py-4 rounded-2xl font-bold hover:bg-gray-100 transition text-sm"
                                        >
                                            <div className="flex items-center">
                                                <Icon name="file-code" className="w-5 h-5 mr-3" />
                                                下載應用程式備份 (.html)
                                            </div>
                                        </button>
                                    </div>
                                    
                                    <p className="text-[10px] text-gray-400 text-center italic">
                                        提示：匯入資料會覆蓋目前裝置的所有內容，請謹慎操作。
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Student Modal */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-end justify-center z-[100] p-0 sm:p-4 no-print">
                            <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 animate-slide-up shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                                        <Icon name="user-plus" className="w-6 h-6 mr-2 text-emerald-600" />
                                        新增學員資料
                                    </h2>
                                    <button onClick={() => setIsAddModalOpen(false)} className="bg-gray-100 p-2 rounded-full hover:bg-red-50 transition">
                                        <Icon name="x" className="w-5 h-5 text-gray-500" />
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-500 mb-2">學員姓名</label>
                                        <input 
                                            type="text" 
                                            value={newStudent.name}
                                            onChange={(e) => setNewStudent({...newStudent, name: e.target.value})}
                                            placeholder="例如：王小明"
                                            className="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 transition outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-500 mb-2">購買堂數</label>
                                        <input 
                                            type="number" 
                                            value={newStudent.totalLessons}
                                            onChange={(e) => setNewStudent({...newStudent, totalLessons: e.target.value})}
                                            placeholder="10"
                                            className="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 transition outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-500 mb-2">備註 (可選)</label>
                                        <textarea 
                                            value={newStudent.note}
                                            onChange={(e) => setNewStudent({...newStudent, note: e.target.value})}
                                            placeholder="例：週三晚上、高爾夫初階"
                                            className="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 focus:ring-2 focus:ring-emerald-500 transition outline-none h-24 text-sm"
                                        ></textarea>
                                    </div>
                                    <button 
                                        onClick={addStudent}
                                        className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition transform active:scale-95"
                                    >
                                        準備開球！建立學員
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Check-In Signature Modal */}
                    <CheckInModal 
                        isOpen={!!checkInStudent}
                        onClose={() => setCheckInStudent(null)}
                        onConfirm={completeCheckIn}
                        studentName={checkInStudent?.name}
                    />

                    {/* Edit Log Modal */}
                    <EditLogModal 
                        isOpen={!!editingLog}
                        onClose={() => setEditingLog(null)}
                        onSave={saveEditedLog}
                        log={editingLog}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</body>
</html>
